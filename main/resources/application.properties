server.port=8080
spring.application.name=mentorhub-backend

spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=mentor_mentee;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=YourStrongPassword!
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

app.cors.allowed-origins=http://localhost:5173
